services:
  postgres:
    image: postgres:17
    container_name: daypilot-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: daypilot

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

  redis:
    image: redis:8
    container_name: daypilot-redis

    ports:
      - "6379:6379"

    restart: unless-stopped

volumes:
  postgres_data: